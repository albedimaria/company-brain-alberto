<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Al Dente · Company Brain</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet">
  <script>window.__threeReadyP = new Promise(r => { window.__threeReadyResolve = r; });</script>
  <script type="module">
    import * as THREE from '/static/vendor/three.module.min.js';
    window.THREE = THREE; window.__threeReadyResolve();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="/static/vendor/force-graph.min.js"></script>
  <script src="/static/vendor/3d-force-graph.min.js"></script>
  <style>
    /* Refactoring UI tokens: spacing 4/8/12/16/24/32/48, type 12–24, hierarchy via weight+color */
    :root{
      --s1:4px; --s2:8px; --s3:12px; --s4:16px; --s5:24px; --s6:32px; --s7:48px;
      --text-xs:12px; --text-sm:14px; --text-base:16px; --text-lg:18px; --text-xl:20px; --text-2xl:24px;
      --leading-tight:1.2; --leading-normal:1.5; --leading-relaxed:1.65;
      --fw-normal:400; --fw-medium:500; --fw-semibold:600; --fw-bold:700;
      --bg:#FBF8F2; --surface:#ffffff; --surface2:#FCFAF5; --line:#ECE3D3; --line2:#E3D8C4;
      --ink:#211D16; --ink-secondary:#4A4538; --muted:#6F6857; --muted2:#8C8472; --muted3:#A89F8C;
      --gold:#C8841E; --gold-soft:#E0A23C; --gold-bg:#FBEFD8;
      --blue:#4454FF; --blue-deep:#2C1AE2; --blue-bg:#EEF0FF;
      --graph-bg:#0b1020;
      --customer:#6E8BFF; --product:#FFC23F; --material:#5FD0A0; --supplier:#22D3EE;
      --shadow-sm:0 1px 2px rgba(33,29,22,.05);
      --shadow-md:0 4px 6px -1px rgba(33,29,22,.07), 0 2px 4px -1px rgba(33,29,22,.04);
      --shadow-lg:0 10px 24px -4px rgba(33,29,22,.09), 0 4px 8px -2px rgba(33,29,22,.04);
      --radius-sm:8px; --radius-md:12px; --radius-lg:16px;
    }
    *{box-sizing:border-box}
    html{font-size:16px;-webkit-font-smoothing:antialiased}
    html,body{height:100%}
    body{margin:0;color:var(--ink);font:var(--fw-normal) var(--text-base)/var(--leading-relaxed) Figtree,ui-sans-serif,system-ui,sans-serif;
      display:flex;flex-direction:column;height:100vh;overflow:hidden;
      background:
        radial-gradient(900px 520px at 88% -8%, rgba(200,132,30,.06), transparent 60%),
        radial-gradient(820px 540px at -6% 108%, rgba(68,84,255,.05), transparent 55%),
        var(--bg);
      background-attachment:fixed}

    header{padding:var(--s4) var(--s6);border-bottom:1px solid var(--line);
      display:flex;align-items:center;justify-content:space-between;gap:var(--s4);
      background:rgba(251,248,242,.88);backdrop-filter:blur(8px);position:relative;flex:0 0 auto}
    header::after{content:"";position:absolute;left:0;right:0;bottom:-1px;height:2px;
      background:linear-gradient(90deg,#FFEC30,#8090FF 55%,#4454FF);opacity:.85}
    .brandwrap{display:flex;align-items:center;gap:var(--s3)}
    .mark{width:var(--s6);height:var(--s6);border-radius:var(--radius-sm);flex:0 0 auto;
      background:linear-gradient(150deg,#FFEC30 0%,#FFE54A 24%,#8090FF 68%,#4454FF 100%);
      box-shadow:var(--shadow-md)}
    header h1{font:var(--fw-semibold) var(--text-2xl)/var(--leading-tight) Fraunces,Georgia,serif;margin:0;
      letter-spacing:-.01em;color:var(--ink)}
    header h1 .srl{color:var(--gold);font-weight:var(--fw-semibold)}
    header .sub{font:var(--fw-medium) var(--text-xs)/1 ui-monospace,monospace;letter-spacing:.2em;
      text-transform:uppercase;color:var(--muted);margin-top:var(--s1)}
    .hdr-right{display:flex;align-items:center;gap:var(--s3)}
    .lang{display:inline-flex;background:var(--surface);border:1px solid var(--line2);
      border-radius:var(--radius-sm);padding:2px;gap:2px}
    .lang button{background:transparent;border:0;color:var(--muted2);cursor:pointer;
      font:var(--fw-semibold) var(--text-xs)/1 Manrope,sans-serif;padding:var(--s2) var(--s3);
      border-radius:6px;transition:color .15s,background .15s}
    .lang button:hover{color:var(--ink)}
    .lang button.on{background:var(--blue-bg);color:var(--blue-deep)}
    .yt{font-size:var(--text-xs);color:var(--muted2);line-height:1;white-space:nowrap}
    .yt .dot{display:inline-block;vertical-align:middle;width:6px;height:6px;margin-right:6px;border-radius:50%;
      background:linear-gradient(135deg,#FFEC30,#4454FF)}
    .yt a{color:var(--blue);font-weight:var(--fw-bold);text-decoration:none}
    .yt a:hover{text-decoration:underline}
    footer{border-top:1px solid var(--line);padding:var(--s4) var(--s6);
      background:rgba(251,248,242,.88);backdrop-filter:blur(8px);
      display:flex;align-items:center;justify-content:flex-start;flex:0 0 auto}

    .wrap{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.12fr);gap:0;
      flex:1;min-height:0}
    @media (max-width:920px){
      .wrap{grid-template-columns:1fr;overflow-y:auto}
      .col.right{flex:none}
      #graph{flex:none;height:min(40vh,360px)}
    }
    .col{padding:var(--s4) var(--s6);overflow:hidden;min-height:0}
    .col.right{display:flex;flex-direction:column;min-height:0}
    .col.left{border-right:1px solid var(--line);position:relative;isolation:isolate;
      overflow-x:hidden;overflow-y:hidden;display:flex;flex-direction:column}
    .results{flex:1;min-height:0;display:flex;flex-direction:column;gap:var(--s3);
      margin-top:var(--s3);overflow:hidden}
    .results .answer{flex:1;min-height:0;margin-top:0;overflow-y:auto}
    .results .meta{flex:0 0 auto;margin-top:0;max-height:38%;overflow-y:auto}
    .col.left::before{content:"";position:absolute;left:-32px;bottom:0;width:320px;height:280px;
      transform:rotate(-12deg);pointer-events:none;z-index:-1;opacity:.07;
      background:url("/static/assets/rigatone.png") center/contain no-repeat}

    .ask{display:flex;gap:var(--s3)}
    textarea{flex:1;background:var(--surface);color:var(--ink);
      border:1px solid var(--line2);border-radius:var(--radius-md);padding:var(--s3) var(--s4);
      font:inherit;line-height:var(--leading-normal);resize:vertical;min-height:48px;max-height:96px;outline:none;
      box-shadow:var(--shadow-sm);transition:border-color .15s,box-shadow .15s}
    textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(68,84,255,.14)}
    textarea::placeholder{color:var(--muted3);font-weight:var(--fw-normal)}
    button.ask-btn{background:linear-gradient(135deg,#4454FF,#2C1AE2);color:#fff;border:0;
      border-radius:var(--radius-md);padding:0 var(--s5);font:var(--fw-bold) var(--text-sm)/1 Manrope,sans-serif;
      cursor:pointer;box-shadow:var(--shadow-md);transition:transform .1s,filter .15s}
    button.ask-btn:hover{filter:brightness(1.06)}
    button.ask-btn:active{transform:translateY(1px)}
    button.ask-btn:disabled{opacity:.5;cursor:wait}

    .chips-fold{flex:0 0 auto;margin-top:var(--s3)}
    .chips-fold summary{font:var(--fw-semibold) var(--text-xs)/1.3 Manrope,sans-serif;text-transform:uppercase;
      letter-spacing:.08em;color:var(--muted2);cursor:pointer;list-style:none;user-select:none;padding:2px 0}
    .chips-fold summary::-webkit-details-marker{display:none}
    .chips-fold summary::after{content:' ▸';opacity:.7}
    .chips-fold[open] summary::after{content:' ▾'}
    .chips{margin:var(--s3) 0 0;display:flex;flex-wrap:nowrap;gap:var(--s3);
      overflow-x:auto;overflow-y:hidden;padding-bottom:4px;scrollbar-width:thin}
    .chip{flex:0 0 auto;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      font-size:var(--text-xs);font-weight:var(--fw-medium);color:var(--muted);
      background:var(--surface);border:1px solid var(--line2);border-radius:999px;
      padding:6px 12px;cursor:pointer;
      transition:color .15s,border-color .15s,background .15s}
    .chip:hover{color:var(--ink-secondary);border-color:var(--gold-soft);background:var(--gold-bg)}

    .answer{background:var(--surface);border:1px solid var(--line);
      border-radius:var(--radius-lg);padding:var(--s4);min-height:72px;
      line-height:var(--leading-relaxed);font-size:var(--text-base);
      color:var(--ink);box-shadow:var(--shadow-sm)}
    .answer .spin{color:var(--muted);font-style:italic;font-size:var(--text-sm);white-space:pre-wrap}
    .answer .md{white-space:normal}
    .answer .md h1,.answer .md h2,.answer .md h3{font:var(--fw-semibold) var(--text-base)/1.3 Figtree,sans-serif;margin:0 0 8px;color:var(--ink)}
    .answer .md p{margin:0 0 8px}
    .answer .md ul{margin:0 0 8px;padding-left:20px}
    .answer .md li{margin:2px 0}
    .answer .md strong{font-weight:var(--fw-semibold)}
    .answer .md hr{border:0;border-top:1px solid var(--line);margin:10px 0}
    .answer .md em{color:var(--muted)}
    .answer iframe{width:100%;height:440px;border:1px solid var(--line);background:#fff;border-radius:var(--radius-md)}

    .meta{display:flex;flex-direction:column;gap:var(--s2)}
    .meta-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);
      padding:var(--s3) var(--s4);box-shadow:var(--shadow-sm)}
    .meta-row{display:flex;flex-wrap:wrap;align-items:center;gap:var(--s2) var(--s3)}
    .meta-row + .meta-row{margin-top:var(--s2);padding-top:var(--s2);border-top:1px solid var(--line)}
    .meta-lbl{font:var(--fw-semibold) 10px/1 Manrope,sans-serif;text-transform:uppercase;
      letter-spacing:.1em;color:var(--muted3);flex:0 0 100%}
    .badge{font:var(--fw-semibold) var(--text-xs)/1 Manrope,sans-serif;
      padding:var(--s2) var(--s3);border-radius:6px;color:#fff}
    .meta-time{font:var(--fw-medium) var(--text-xs)/1 ui-monospace,monospace;color:var(--muted2)}
    .meta-srcs{display:flex;flex-wrap:wrap;gap:var(--s2)}
    .src{background:var(--surface2);border:1px solid var(--line2);color:var(--ink-secondary);
      font:var(--fw-normal) var(--text-xs)/1 ui-monospace,monospace;padding:var(--s2) var(--s3);border-radius:6px}
    button.copy-btn{cursor:pointer;font:var(--fw-medium) var(--text-xs)/1 Manrope,sans-serif}
    button.copy-btn:hover{background:var(--gold-bg);border-color:var(--gold-soft);color:var(--ink)}
    a.dl{color:#fff;background:linear-gradient(135deg,#C8841E,#A66A12);text-decoration:none;
      font:var(--fw-bold) var(--text-sm) Manrope,sans-serif;padding:var(--s2) var(--s4);
      border-radius:var(--radius-sm);box-shadow:var(--shadow-sm);margin-top:var(--s2);display:inline-block}

    .ghead{display:flex;align-items:center;justify-content:space-between;margin:0 0 var(--s3);gap:var(--s3);flex:0 0 auto}
    h2{font:var(--fw-semibold) var(--text-xs)/1 Manrope,sans-serif;text-transform:uppercase;
      letter-spacing:.16em;color:var(--muted);margin:0}
    .seg{display:inline-flex;background:var(--surface);border:1px solid var(--line2);
      border-radius:var(--radius-md);padding:3px;gap:2px;box-shadow:var(--shadow-sm)}
    .seg button{background:transparent;border:0;color:var(--muted);cursor:pointer;
      font:var(--fw-semibold) var(--text-xs)/1 Manrope,sans-serif;padding:var(--s2) var(--s3);
      border-radius:6px;transition:color .15s,background .15s,box-shadow .15s}
    .seg button:hover{color:var(--ink-secondary)}
    .seg button.on{background:linear-gradient(135deg,#4454FF,#2C1AE2);color:#fff;box-shadow:var(--shadow-sm)}

    #graph{flex:1;min-height:0;height:auto;border:2px solid var(--line2);
      border-radius:var(--radius-lg);background:var(--graph-bg);overflow:hidden;position:relative;
      box-shadow:var(--shadow-lg)}
    .legend{display:flex;gap:var(--s4);flex-wrap:wrap;margin-top:var(--s3);flex:0 0 auto;
      justify-content:center;width:100%;font-size:var(--text-sm);font-weight:var(--fw-medium);color:var(--muted)}
    .legend span{display:inline-flex;align-items:center;gap:var(--s2)}
    .legend .dot{width:10px;height:10px;border-radius:50%;flex:0 0 auto;
      box-shadow:0 0 0 1px rgba(33,29,22,.08)}
    .legend .dot.customer{background:var(--customer)}
    .legend .dot.product{background:var(--product)}
    .legend .dot.material{background:var(--material)}
    .legend .dot.supplier{background:var(--supplier)}
    .hint{position:absolute;left:50%;bottom:var(--s3);transform:translateX(-50%);
      font:var(--fw-normal) var(--text-xs)/1.4 ui-monospace,monospace;
      color:#AEB7DA;pointer-events:none;z-index:5;max-width:92%;text-align:center;
      background:rgba(17,24,47,.55);padding:4px 9px;border-radius:7px;backdrop-filter:blur(2px)}
    .scene-nav-info{display:none!important}
    .graph-info{position:absolute;top:12px;left:12px;z-index:5;max-width:240px;padding:12px 14px;
      border-radius:10px;background:rgba(17,24,47,.92);border:1px solid #2a3458;
      font:13px/1.45 Figtree,sans-serif;color:#eef2ff;pointer-events:auto;
      box-shadow:0 8px 24px rgba(0,0,0,.35)}
    .graph-info .gi-x{position:absolute;top:8px;right:10px;background:none;border:0;color:#9aa6d6;
      cursor:pointer;font-size:16px;line-height:1;padding:2px 4px}
    .graph-info .gi-x:hover{color:#eef2ff}
    .graph-info .gi-title{font-weight:700;font-size:14px;padding-right:20px}
    .graph-info .gi-group{font:600 10px/1 Manrope,sans-serif;text-transform:uppercase;
      letter-spacing:.12em;color:#9aa6d6;margin-top:4px}
    .graph-info .gi-desc{color:#b8c4e8;font-size:12px;margin-top:6px}
    .graph-info .gi-h{font-size:11px;font-weight:600;color:#9aa6d6;margin:10px 0 6px;
      text-transform:uppercase;letter-spacing:.06em}
    .graph-info .gi-conn{font-size:12px;color:#d7deff;padding:2px 0}
    .graph-info .gi-more{font-size:11px;color:#8e98c4;margin-top:4px}
    .graph-info .gi-ask{display:block;width:100%;margin-top:10px;border:0;border-radius:8px;
      padding:8px 10px;font:var(--fw-bold) 12px/1 Manrope,sans-serif;cursor:pointer;color:#fff;
      background:linear-gradient(135deg,#4454FF,#2C1AE2);box-shadow:var(--shadow-sm)}
    .graph-info .gi-ask:hover{filter:brightness(1.06)}
    @media (prefers-reduced-motion:reduce){
      button.ask-btn,.chip,.seg button,.lang button{transition:none}
    }
  </style>
</head>
<body>
  <header>
    <div class="brandwrap">
      <div class="mark"></div>
      <div>
        <h1>Al Dente <span class="srl">S.r.l.</span></h1>
        <div class="sub" data-i18n="subtitle">Company Brain</div>
      </div>
    </div>
    <div class="hdr-right">
      <div class="lang" id="langSwitch">
        <button type="button" class="lang-btn" data-lang="it">IT</button>
        <button type="button" class="lang-btn" data-lang="en">EN</button>
        <button type="button" class="lang-btn" data-lang="es">ES</button>
      </div>
    </div>
  </header>

  <div class="wrap">
    <section class="col left">
      <div class="ask">
        <textarea id="q" data-i18n-placeholder="placeholder"></textarea>
        <button id="send" class="ask-btn" data-i18n="ask">Ask</button>
      </div>
      <details class="chips-fold" id="chipsFold">
        <summary data-i18n="samplesLbl">Examples</summary>
        <div class="chips" id="chips"></div>
      </details>
      <div class="results">
        <div class="answer" id="answer"><span class="spin" id="answerIdle" data-i18n="answersHere">Answers appear here.</span></div>
        <div class="meta" id="meta"></div>
      </div>
    </section>

    <section class="col right">
      <div class="ghead">
        <h2 data-i18n="knowledgeGraph">Knowledge graph</h2>
        <div class="seg" id="seg">
          <button data-mode="2d" data-i18n="mode2d">2D · standard</button>
          <button data-mode="3d" class="on" data-i18n="mode3d">3D · dinamica</button>
        </div>
      </div>
      <div id="graph"><div class="hint" id="hint"></div></div>
      <div class="legend">
        <span><i class="dot customer" aria-hidden="true"></i><span data-i18n="legendCustomer">customer</span></span>
        <span><i class="dot product" aria-hidden="true"></i><span data-i18n="legendProduct">product</span></span>
        <span><i class="dot material" aria-hidden="true"></i><span data-i18n="legendMaterial">raw material</span></span>
        <span><i class="dot supplier" aria-hidden="true"></i><span data-i18n="legendSupplier">supplier</span></span>
      </div>
    </section>
  </div>

  <footer>
    <div class="yt" data-i18n="attribution" data-i18n-html><span class="dot"></span>suggested by <a href="https://yellowtech.it/" target="_blank" rel="noopener noreferrer">Yellow Tech</a></div>
  </footer>

        ],
        requestFailed: 'Solicitud fallida: ',

        mode2d: '2D · estándar',
        mode3d: '3D · dinámica',

        hint3d: 'arrastra para rotar · scroll para zoom · clic para fijar el foco · doble clic para detalles',
        hint2d: 'arrastra para mover · scroll para zoom · clic para fijar el foco · doble clic para detalles',
        graphUnavailable: 'Grafo no disponible: ',

        vertCalls: 'Llamadas',
        vertKb: 'Documentos (KB)',
        metaCopy: 'Copiar respuesta',
        metaCopied: '¡Respuesta copiada!'
      }
    };
    let lang = localStorage.getItem('lang') || 'it';
    if (!I18N[lang]) lang = 'it';

    function t(key){ return I18N[lang][key]; }

    function applyLang(){
      document.documentElement.lang = lang;
      document.title = t('pageTitle');
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const v = t(el.dataset.i18n);
        if ('i18nHtml' in el.dataset) el.innerHTML = v;
        else el.textContent = v;
      });
      const qEl = document.getElementById('q');
      if (qEl) qEl.placeholder = t('placeholder');
      document.querySelectorAll('.lang-btn').forEach(b =>
        b.classList.toggle('on', b.dataset.lang === lang));
      rebuildChips();
      const hintEl = document.getElementById('hint');
      if (hintEl && instance) ensureHint();
      const dl = meta.querySelector('a.dl');
      if (dl) dl.textContent = t('downloadFile');
      if (lastMeta) renderMeta(lastMeta.d, lastMeta.secs);
    }

    function setLang(next){
      if (!I18N[next] || next === lang) return;
      lang = next;
      localStorage.setItem('lang', lang);
      applyLang();
    }

    document.getElementById('langSwitch').addEventListener('click', e => {
      const b = e.target.closest('.lang-btn');
      if (b) setLang(b.dataset.lang);
    });

    const chipsEl = document.getElementById('chips');
    function rebuildChips(){
      chipsEl.innerHTML = '';
      t('samples').forEach(s => {
        const el = document.createElement('span');
        el.className = 'chip';
        el.textContent = s.length > 58 ? s.slice(0, 55) + '...' : s;
        el.title = s;
        el.onclick = () => { q.value = s; document.getElementById('chipsFold')?.removeAttribute('open'); ask(); };
        chipsEl.appendChild(el);
      });
    }

    const q = document.getElementById('q');
    const send = document.getElementById('send');
    const answer = document.getElementById('answer');
    const meta = document.getElementById('meta');
    const vColors = {crm:'#4454FF', erp:'#C8841E', calls:'#0EA5C4', kb:'#2BA67D'};
    const VERT_I18N = {crm:'vertCrm', erp:'vertErp', calls:'vertCalls', kb:'vertKb'};
    let lastMeta = null;
    let lastAnswerText = null;

    function vertLabel(v){
      return t(VERT_I18N[v] || 'vertCrm');
    }

    function wireCopyBtn(btn){
      if (!btn || !lastAnswerText) return;
      btn.textContent = t('metaCopy');
      btn.onclick = async () => {
        try {
          await navigator.clipboard.writeText(lastAnswerText);
          btn.textContent = t('metaCopied');
          setTimeout(() => { btn.textContent = t('metaCopy'); }, 1200);
        } catch(e) { /* clipboard blocked */ }
      };
    }

    function renderMeta(d, secs){
      lastMeta = {d, secs};
      const v = (d.verticale || '').toLowerCase();
      const sources = d.sources || [];
      let html = '<div class="meta-card">';
      html += '<div class="meta-row"><span class="meta-lbl">' + escHtml(t('metaArea')) + '</span>'
        + '<span class="badge" style="background:' + (vColors[v] || '#888') + '">' + escHtml(vertLabel(v)) + '</span>'
        + '<span class="meta-time">' + escHtml(t('metaTime').replace('{n}', secs)) + '</span>';
      if (lastAnswerText) html += '<button type="button" class="src copy-btn">' + escHtml(t('metaCopy')) + '</button>';
      html += '</div>';
      if (sources.length) {
        html += '<div class="meta-row"><span class="meta-lbl">' + escHtml(t('metaSources')) + '</span>'
          + '<div class="meta-srcs">' + sources.map(s => '<span class="src">' + escHtml(s) + '</span>').join('') + '</div></div>';
      }
      html += '</div>';
      meta.innerHTML = html;
      wireCopyBtn(meta.querySelector('.copy-btn'));
      if (d.artifact_url) {
        const a = document.createElement('a');
        a.className = 'dl'; a.href = d.artifact_url; a.textContent = t('downloadFile'); a.target = '_blank';
        meta.appendChild(a);
      }
    }

    function escHtml(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

    function looksHtml(s){ return /<\/?(section|div|h[1-6]|table|ul|ol|article|html|body|style)/i.test(s); }
    function stripBold(s){ return (s||'').replace(/\*\*(.*?)\*\*/g, '$1'); }

    let thinkTimer = null;
    function startThinking(){
      const lines = t('thinkingLines');
      let i = 0;
      answer.innerHTML = '<span class="spin">' + lines[0] + '</span>';
      thinkTimer = setInterval(() => {
        i = (i + 1) % lines.length;
        const el = answer.querySelector('.spin');
        if (el) el.textContent = lines[i];
      }, 2400);
    }
    function stopThinking(){
      if (thinkTimer) { clearInterval(thinkTimer); thinkTimer = null; }
    }

    async function ask(){
      const question = q.value.trim();
      if(!question) return;
      send.disabled = true; meta.innerHTML = ''; lastMeta = null; lastAnswerText = null;
      startThinking();
      const t0 = performance.now();
      try{
        const r = await fetch('/ask', {method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({question, lang})});
        const d = await r.json();
        const secs = ((performance.now()-t0)/1000).toFixed(1);
        const clean = stripBold(d.answer || '(empty)');
        if(looksHtml(clean)){
          const f = document.createElement('iframe');
          answer.innerHTML = ''; answer.appendChild(f); f.srcdoc = clean;
          lastAnswerText = null;
        } else {
          lastAnswerText = clean;
          answer.innerHTML = '<div class="md">' + marked.parse(clean) + '</div>';
        }
        renderMeta(d, secs);
      }catch(e){ lastAnswerText = null; answer.textContent = t('requestFailed') + e; }
      finally { stopThinking(); }
      send.disabled = false;
    }
    send.onclick = ask;
    q.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); ask(); }
    });

    /* ---------- Knowledge graph (2D standard / 3D dinamica) ---------- */
    const EMOJI = {customer:'🏬', product:'🍝', material:'🌾', supplier:'🏭'};
    const COL   = {customer:'#6E8BFF', product:'#FFC23F', material:'#5FD0A0', supplier:'#22D3EE'};
    const SIZE  = {customer:9, product:12, material:9, supplier:11};
    const graphEl = document.getElementById('graph');
    let GDATA = null, instance = null, mode = '3d';
    let maxAniso = 16;

    async function loadData(){
      if(GDATA) return GDATA;
      const r = await fetch('/graph'); const g = await r.json();
      GDATA = {
        nodes: g.nodes,
        links: (g.edges||[]).map(e => ({source:e.from, target:e.to, label:e.label}))
      };
      return GDATA;
    }

    const texCache = {};
    const labelCache = {};
    function emojiTexture(group){
      if(texCache[group]) return texCache[group];
      const THREE = window.THREE;
      const c = document.createElement('canvas'); c.width = c.height = 256;
      const x = c.getContext('2d');
      x.clearRect(0, 0, 256, 256);
      x.font = '150px "Segoe UI Emoji","Apple Color Emoji",sans-serif';
      x.textAlign = 'center'; x.textBaseline = 'middle';
      x.fillText(EMOJI[group]||'•', 128, 128);
      const t = new THREE.CanvasTexture(c);
      t.minFilter = THREE.LinearFilter;
      t.magFilter = THREE.LinearFilter;
      t.anisotropy = maxAniso;
      texCache[group] = t; return t;
    }

    function labelTexture(text){
      const key = text || '';
      if(labelCache[key]) return labelCache[key];
      const THREE = window.THREE;
      const c = document.createElement('canvas');
      c.width = 512; c.height = 128;
      const x = c.getContext('2d');
      x.clearRect(0, 0, 512, 128);
      const display = key.length > 22 ? key.slice(0, 20) + '…' : key;
      x.font = '500 36px Figtree, sans-serif';
      x.textAlign = 'center'; x.textBaseline = 'middle';
      x.fillStyle = '#d7deff';
      x.fillText(display, 256, 64);
      const t = new THREE.CanvasTexture(c);
      t.minFilter = THREE.LinearFilter;
      t.magFilter = THREE.LinearFilter;
      labelCache[key] = t;
      return t;
    }

    function applyGraphForces(G){
      try {
        G.d3Force('charge').strength(-120);
        const lf = G.d3Force('link');
        if (lf && lf.distance) lf.distance(48);
      } catch(e) {}
    }

    let hoverNode = null;
    let lockedNode = null;
    let clickTimer = null;
    let lastClickId = null;
    const highlightNodes = new Set();
    const highlightLinks = new Set();
    const GROUP_I18N = {customer:'legendCustomer', product:'legendProduct', material:'legendMaterial', supplier:'legendSupplier'};
    const NODE_QUESTIONS = {
      it: {
        customer: 'Riepilogo del cliente {label} ({id}): opportunità aperte, ordini e reclami recenti.',
        product: 'Riepilogo dello SKU {label}: scorta vs minimo, distinta base (materiali e fornitori) e ordini collegati.',
        material: 'Materia prima {label}: fornitore, scorta vs minimo, e in quali prodotti è usata.',
        supplier: 'Fornitore {label}: quali materiali fornisce e quali prodotti dipendono da lui.'
      },
      en: {
        customer: 'Summary for customer {label} ({id}): open opportunities, orders, and recent complaints.',
        product: 'Summary for SKU {label}: stock vs minimum, bill of materials (materials and suppliers), and linked orders.',
        material: 'Raw material {label}: supplier, stock vs minimum, and which products use it.',
        supplier: 'Supplier {label}: which materials they provide and which products depend on them.'
      },
      es: {
        customer: 'Resumen del cliente {label} ({id}): oportunidades abiertas, pedidos y reclamos recientes.',
        product: 'Resumen del SKU {label}: stock vs mínimo, lista de materiales (materias primas y proveedores) y pedidos vinculados.',
        material: 'Materia prima {label}: proveedor, stock vs mínimo y en qué productos se usa.',
        supplier: 'Proveedor {label}: qué materiales suministra y qué productos dependen de él.'
      }
    };

    function groupLabel(g){ return t(GROUP_I18N[g] || 'legendCustomer'); }
    function buildNodeQuestion(node){
      const bank = NODE_QUESTIONS[lang] || NODE_QUESTIONS.it;
      const tmpl = bank[node.group] || bank.customer;
      return tmpl.replace('{label}', node.label).replace('{id}', node.id || '');
    }

    function closeInfoPanel(){
      document.getElementById('graphInfo')?.remove();
    }

    function openInfoPanel(node){
      closeInfoPanel();
      const neighbors = node.neighbors || [];
      const byGroup = {};
      neighbors.forEach(n => {
        const g = n.group || 'other';
        (byGroup[g] ||= []).push(n);
      });
      const items = [];
      Object.keys(byGroup).sort().forEach(g => byGroup[g].forEach(n => items.push({g, n})));
      const shown = items.slice(0, 10);
      const rest = items.length - shown.length;
      const panel = document.createElement('div');
      panel.id = 'graphInfo';
      panel.className = 'graph-info';
      panel.innerHTML =
        `<button type="button" class="gi-x" aria-label="Close">×</button>`
        + `<div class="gi-title">${EMOJI[node.group]||''} ${escHtml(node.label)}</div>`
        + `<div class="gi-group">${escHtml(groupLabel(node.group))}</div>`
        + (node.title ? `<div class="gi-desc">${escHtml(node.title)}</div>` : '')
        + `<div class="gi-h">${t('graphConnections').replace('{n}', neighbors.length)}</div>`
        + shown.map(({g, n}) => `<div class="gi-conn">${EMOJI[g]||'•'} ${escHtml(n.label)}</div>`).join('')
        + (rest > 0 ? `<div class="gi-more">${t('graphMore').replace('{n}', rest)}</div>` : '')
        + `<button type="button" class="gi-ask">${escHtml(t('askBrain'))}</button>`;
      panel.querySelector('.gi-x').onclick = closeInfoPanel;
      panel.querySelector('.gi-ask').onclick = () => {
        q.value = buildNodeQuestion(node);
        closeInfoPanel();
        ask();
      };
      graphEl.appendChild(panel);
    }

    function flyToNode3D(G, node){
      const d = 90, h = Math.hypot(node.x||1, node.y||1, node.z||1) || 1, ratio = 1 + d/h;
      G.cameraPosition({x:(node.x||0)*ratio, y:(node.y||0)*ratio, z:(node.z||0)*ratio}, node, 1100);
    }

    function wireGraphInteractions(G){
      G.onNodeHover(node => {
        if (lockedNode) return;
        setGraphHover(G, node);
      });
      G.onNodeClick(node => {
        if (lastClickId === node.id && clickTimer) {
          clearTimeout(clickTimer);
          clickTimer = null;
          lastClickId = null;
          openInfoPanel(node);
          if (mode === '3d') flyToNode3D(G, node);
          return;
        }
        lastClickId = node.id;
        if (clickTimer) clearTimeout(clickTimer);
        clickTimer = setTimeout(() => {
          clickTimer = null;
          lastClickId = null;
          if (lockedNode === node) {
            lockedNode = null;
            setGraphHover(G, null);
          } else {
            lockedNode = node;
            setGraphHover(G, node);
          }
        }, 250);
      });
      G.onBackgroundClick(() => {
        lockedNode = null;
        setGraphHover(G, null);
        closeInfoPanel();
      });
    }

    function ensureHint(){
      graphEl.querySelectorAll('.scene-nav-info').forEach(el => el.remove());
      let h = document.getElementById('hint');
      if (!h) {
        h = document.createElement('div');
        h.className = 'hint';
        h.id = 'hint';
        graphEl.appendChild(h);
      }
      h.textContent = mode === '3d' ? t('hint3d') : t('hint2d');
    }

    function prepGraphNeighborhood(data){
      data.nodes.forEach(n => { n.neighbors = []; n.links = []; });
      data.links.forEach(link => {
        const a = typeof link.source === 'object' ? link.source
          : data.nodes.find(n => n.id === link.source);
        const b = typeof link.target === 'object' ? link.target
          : data.nodes.find(n => n.id === link.target);
        if (!a || !b) return;
        link.source = a; link.target = b;
        a.neighbors.push(b); b.neighbors.push(a);
        a.links.push(link); b.links.push(link);
      });
      return data;
    }

    function setGraphHover(G, node){
      hoverNode = node || null;
      highlightNodes.clear();
      highlightLinks.clear();
      if (node) {
        highlightNodes.add(node);
        node.neighbors.forEach(n => highlightNodes.add(n));
        node.links.forEach(l => highlightLinks.add(l));
      }
      G.linkColor(G.linkColor());
      G.linkWidth(G.linkWidth());
      if (G.linkDirectionalArrowColor) G.linkDirectionalArrowColor(G.linkDirectionalArrowColor());
      if (G.linkDirectionalArrowLength) G.linkDirectionalArrowLength(G.linkDirectionalArrowLength());
      if (mode === '3d') applyNodeDim3D(G);
      else if (G.nodeCanvasObject) G.nodeCanvasObject(G.nodeCanvasObject());
    }

    function linkPaint(link){
      if (!hoverNode) return 'rgba(120,148,255,0.18)';
      return highlightLinks.has(link) ? 'rgba(168,188,255,0.52)' : 'rgba(55,68,110,0.04)';
    }
    function linkPaintW(link){
      if (!hoverNode) return 0.55;
      return highlightLinks.has(link) ? 0.85 : 0.2;
    }
    function arrowPaint(link){
      if (!hoverNode) return 'rgba(150,175,255,0.28)';
      return highlightLinks.has(link) ? 'rgba(188,206,255,0.62)' : 'rgba(55,68,110,0.04)';
    }
    function arrowLen(link){
      if (!hoverNode) return 2.5;
      return highlightLinks.has(link) ? 3 : 1.5;
    }

    function applyNodeDim3D(G){
      const active = !!hoverNode;
      G.graphData().nodes.forEach(n => {
        const grp = n.__threeObj;
        if (!grp) return;
        const lit = !active || highlightNodes.has(n);
        const bodyOp = lit ? 1 : 0.14;
        const labelOp = active ? (lit ? 1 : 0.05) : 0.35;
        grp.children.forEach(ch => {
          if (ch === grp.userData.label || !ch.material) return;
          ch.material.transparent = true;
          ch.material.opacity = bodyOp;
        });
        const lbl = grp.userData.label;
        if (lbl && lbl.material) lbl.material.opacity = labelOp;
      });
    }

    function clearInstance(){
      if(instance && instance.pauseAnimation){ try{ instance.pauseAnimation(); }catch(e){} }
      if (clickTimer) { clearTimeout(clickTimer); clickTimer = null; }
      lastClickId = null;
      lockedNode = null;
      closeInfoPanel();
      instance = null;
      graphEl.innerHTML = '<div class="hint" id="hint"></div>';
    }

    function freezeGraph(G){
      G.graphData().nodes.forEach(n => {
        if(n.x == null) return;
        n.fx = n.x; n.fy = n.y;
        if(n.z != null) n.fz = n.z;
      });
    }

    function render3D(data){
      const THREE = window.THREE;
      const G = new ForceGraph3D(graphEl)
        .backgroundColor('#0b1020')
        .graphData(data)
        .warmupTicks(0)
        .cooldownTicks(60)
        .d3AlphaDecay(0.08)
        .d3VelocityDecay(0.55)
        .nodeVal(n => SIZE[n.group] || 11)
        .nodeThreeObject(n => {
          const grp = new THREE.Group();
          const color = COL[n.group] || '#888';
          const k = SIZE[n.group] || 11;
          const bead = new THREE.Mesh(
            new THREE.SphereGeometry(2.5, 20, 20),
            new THREE.MeshStandardMaterial({ color, roughness: 0.45, metalness: 0.12, transparent: true, opacity: 1 })
          );
          grp.add(bead);
          const emo = new THREE.Sprite(new THREE.SpriteMaterial({
            map: emojiTexture(n.group), transparent: true, depthWrite: false
          }));
          emo.scale.set(k * 0.5, k * 0.5, 1);
          emo.position.set(0, 0, 3.2);
          grp.add(emo);
          const lbl = new THREE.Sprite(new THREE.SpriteMaterial({
            map: labelTexture(n.label), transparent: true, depthWrite: false, opacity: 0.35
          }));
          lbl.scale.set(22, 5.5, 1);
          lbl.position.set(0, -6.5, 0);
          grp.add(lbl);
          grp.userData.label = lbl;
          return grp;
        })
        .nodeLabel(n => `<div style="background:#11182f;color:#eef2ff;border:1px solid #2a3458;border-radius:8px;padding:8px 11px;font:14px Figtree,sans-serif"><b>${EMOJI[n.group]||''} ${n.label}</b><br><span style="color:#9aa6d6;font-size:13px">${n.title||''}</span></div>`)
        .linkColor(linkPaint)
        .linkWidth(linkPaintW)
        .linkLabel(l => l.label||'')
        .linkDirectionalArrowLength(arrowLen).linkDirectionalArrowRelPos(1)
        .linkDirectionalArrowColor(arrowPaint)
        .linkDirectionalParticles(0)
        .showNavInfo(false)
        .onEngineStop(() => {
          freezeGraph(G);
          if (!G.__fitted) { G.__fitted = true; G.zoomToFit(600, 60); }
          applyNodeDim3D(G);
        })
        .width(graphEl.clientWidth).height(graphEl.clientHeight);
      G.scene().add(new THREE.AmbientLight(0xffffff, 0.75));
      const dir = new THREE.DirectionalLight(0xffffff, 0.9);
      dir.position.set(1, 1, 1);
      G.scene().add(dir);
      try {
        maxAniso = Math.min(16, G.renderer().capabilities.getMaxAnisotropy());
        Object.values(texCache).forEach(tex => { tex.anisotropy = maxAniso; });
      } catch(e) {}
      applyGraphForces(G);
      try { const c = G.controls(); if (c) c.zoomSpeed = 3.2; } catch(e) {}
      wireGraphInteractions(G);
      ensureHint();
      return G;
    }

    function render2D(data){
      const G = ForceGraph()(graphEl)
        .backgroundColor('#0b1020')
        .graphData(data)
        .warmupTicks(0)
        .cooldownTicks(60)
        .d3AlphaDecay(0.08)
        .d3VelocityDecay(0.55)
        .enableNodeDrag(false)
        .onEngineStop(function(){
          if(!G.__fitted){ G.__fitted = true; G.zoomToFit(400, 50); }
          freezeGraph(G);
        })
        .nodeRelSize(8)
        .nodeLabel(n => `<div style="background:#11182f;color:#eef2ff;border:1px solid #2a3458;border-radius:8px;padding:8px 11px;font:14px Figtree,sans-serif"><b>${EMOJI[n.group]||''} ${n.label}</b><br><span style="color:#9aa6d6;font-size:13px">${n.title||''}</span></div>`)
        .nodeCanvasObject((node, ctx, gscale) => {
          if(node.x == null || node.y == null) return;
          const active = !!hoverNode;
          const lit = !active || highlightNodes.has(node);
          const bodyAlpha = lit ? 1 : 0.14;
          const r = (SIZE[node.group]||11) * 0.38;
          ctx.save();
          ctx.globalAlpha = bodyAlpha;
          ctx.fillStyle = COL[node.group];
          ctx.beginPath(); ctx.arc(node.x, node.y, r, 0, 2*Math.PI); ctx.fill();
          ctx.strokeStyle = lit ? 'rgba(255,255,255,0.22)' : 'rgba(255,255,255,0.06)';
          ctx.lineWidth = (lit && node === hoverNode ? 1.6 : 1) / gscale;
          ctx.stroke();
          ctx.font = `${r * 1.6}px "Segoe UI Emoji","Apple Color Emoji",sans-serif`;
          ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
          ctx.fillText(EMOJI[node.group]||'•', node.x, node.y);
          if (active && lit) {
            const fs = Math.min(13, Math.max(10, 11 / gscale));
            ctx.globalAlpha = 1;
            ctx.font = `600 ${fs}px Figtree, sans-serif`;
            ctx.fillStyle = node === hoverNode ? '#eef2ff' : '#b8c4e8';
            ctx.textBaseline = 'top';
            ctx.fillText(node.label, node.x, node.y + r + 3);
          }
          ctx.restore();
        })
        .nodePointerAreaPaint((node, color, ctx) => {
          ctx.fillStyle = color; ctx.beginPath();
          ctx.arc(node.x, node.y, (SIZE[node.group]||11) * 0.55, 0, 2*Math.PI); ctx.fill();
        })
        .linkColor(linkPaint)
        .linkWidth(linkPaintW)
        .linkDirectionalArrowLength(arrowLen).linkDirectionalArrowRelPos(1)
        .linkDirectionalArrowColor(arrowPaint)
        .linkDirectionalParticles(0)
        .width(graphEl.clientWidth).height(graphEl.clientHeight);
      applyGraphForces(G);
      wireGraphInteractions(G);
      ensureHint();
      return G;
    }

    async function draw(m){
      mode = m;
      document.querySelectorAll('#seg button').forEach(b =>
        b.classList.toggle('on', b.dataset.mode === m));
      let data;
      try{ data = await loadData(); }
      catch(e){ graphEl.innerHTML = '<div class="hint" id="hint">'+t('graphUnavailable')+e+'</div>'; return; }
      if(m === '3d'){ await window.__threeReadyP; }
      clearInstance();
      hoverNode = null; highlightNodes.clear(); highlightLinks.clear();
      const fresh = prepGraphNeighborhood({
        nodes: data.nodes.map(n => ({...n})),
        links: data.links.map(l => ({source:l.source, target:l.target, label:l.label}))
      });
      instance = (m === '3d') ? render3D(fresh) : render2D(fresh);
    }

    document.getElementById('seg').addEventListener('click', e => {
      const b = e.target.closest('button'); if(b && b.dataset.mode !== mode) draw(b.dataset.mode);
    });
    window.addEventListener('resize', () => {
      if(instance) instance.width(graphEl.clientWidth).height(graphEl.clientHeight);
    });

    applyLang();
    draw('3d');
  </script>
</body>
</html>
